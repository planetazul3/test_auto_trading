name: test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
        include:
          - python-version: '3.11'
            install-extras: 'dev,deriv-ingest,training,tuning,backtest,serving'
            # pandas-ta no tiene wheels para 3.11 → conftest.py auto-skipea
            # los tests de feature_generator e integrity.
            label: 'core suite (no pandas-ta)'
          - python-version: '3.12'
            install-extras: 'dev,deriv-ingest,training,tuning,backtest,serving,legacy-features,analysis'
            label: 'full suite incl. pandas-ta'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Show environment
        run: |
          python -V
          pip -V
          echo "Matrix label: ${{ matrix.label }}"

      - name: Install package + extras
        run: |
          python -m pip install --upgrade pip
          # Instalar con extras según la matriz; cada job aísla sus dependencias.
          pip install -e ".[${{ matrix.install-extras }}]"

      - name: Verify imports compile
        run: |
          python -c "import src.models.tft_attention, src.models.calibration, src.models.cnn_extractor, src.models.bilstm_encoder, src.models.hybrid_tft, src.models.ensemble, src.models.meta_learner, src.models.heads, src.models.conditioning, src.models.composite, src.models.calibration_bundle, src.models.conformal"
          python -c "import src.data, src.training, src.backtest, src.risk"
          python -c "import src.connectors.deriv.storage, src.connectors.deriv.ingest, src.connectors.deriv.client"

      - name: Run tests
        env:
          PYTHONHASHSEED: '0'
        run: |
          pytest --no-header -ra -W error -p no:cacheprovider

      - name: Upload pytest log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-py${{ matrix.python-version }}
          path: |
            .pytest_cache/
            pytest.log
          if-no-files-found: ignore

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          # ruff fijo a la versión declarada en pyproject [dev].
          pip install 'ruff==0.1.15'
      - name: Run ruff
        run: |
          ruff check src tests scripts
